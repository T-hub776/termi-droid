# 1. System Memory and Performance Configurations
# Allocates 2GB of RAM to the compiler daemon and forces safe UTF-8 character text handling
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# 2. Android Modern Architecture Configurations
# Enables support for AndroidX packages and transforms legacy libraries into modern formats
android.useAndroidX=true
android.enableJetifier=true

# 3. Android Native C/C++ (NDK) Compiler Flags
# Forces the C++ compiler to support modern string formatting conventions inside your termidroid.cpp backend
android.native.buildOutput=verbose

